<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Question That Matters</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    height: 100vh;
    background: radial-gradient(circle at center, #1a1a1a, #000);
    font-family: 'Cormorant Garamond', serif;
    color: #f5e9dc;
}

/* SCREEN BASE */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: all 1.2s ease;
}

/* SCREEN 1 */
#screen1 {
    text-align: center;
}

.question {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    margin-bottom: 40px;
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* BUTTONS */
.buttons {
    position: relative;
    width: 100%;
    height: 250px;
}

button {
    padding: 14px 35px;
    border-radius: 40px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    position: absolute;
    backdrop-filter: blur(5px);
}

/* YES BUTTON */
#yesBtn {
    background: rgba(9, 224, 81, 0.1);
    color: #bab5bb;
    border: 1px solid rgba(255,255,255,0.3);
    left: 30%;
    top: 50%;
    transform: translate(-50%, -50%);
}

/* NO BUTTON */
#noBtn {
    background: rgba(78, 63, 207, 0.15);
    color: #f6ffb3;
    border: 1px solid rgba(255,80,80,0.4);
    left: 70%;
    top: 50%;
    transform: translate(-50%, -50%);
    transition: all 0.4s cubic-bezier(.25,.8,.25,1);
}

/* SCREEN 2 */
#screen2 {
    opacity: 0;
    pointer-events: none;
    background: linear-gradient(135deg, #f4e9dc, #e6d3b3);
    color: #5b3a29;
    padding: 20px;
}

/* CARD */
.card {
    max-width: 90%;
    background: rgba(255,255,255,0.65);
    padding: 35px;
    border-radius: 12px;
    border: 1px solid #b89b72;
    box-shadow: 0 0 40px rgba(0,0,0,0.2);
    font-size: 1.1rem;
    line-height: 1.9;
    text-align: center;
}

/* TEXT FADE LINES */
.line {
    opacity: 0;
    transform: translateY(15px);
    animation: rise 1.5s ease forwards;
}

@keyframes rise {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* PARTICLES */
.spark {
    position: absolute;
    width: 6px;
    height: 6px;
    background: gold;
    border-radius: 50%;
    animation: sparkle 2s linear forwards;
}

@keyframes sparkle {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0) translateY(-200px); }
}

</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="screen1" class="screen">
    <div class="question">ARE YOU MY FRIEND?</div>

    <div class="buttons">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen">
    <div class="card" id="text"></div>
</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const screen1 = document.getElementById("screen1");
const screen2 = document.getElementById("screen2");
const textDiv = document.getElementById("text");

/* REALISTIC NO BUTTON MOVEMENT */
function moveNoRealistic() {
    const currentX = noBtn.offsetLeft;
    const currentY = noBtn.offsetTop;

    const targetX = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    const targetY = Math.random() * (window.innerHeight - noBtn.offsetHeight);

    noBtn.style.left = targetX + "px";
    noBtn.style.top = targetY + "px";
}

noBtn.addEventListener("mouseenter", moveNoRealistic);
noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveNoRealistic();
});

/* PARTICLES */
function sparkles() {
    for (let i = 0; i < 40; i++) {
        const s = document.createElement("div");
        s.className = "spark";

        s.style.left = (window.innerWidth/2) + "px";
        s.style.top = (window.innerHeight/2) + "px";

        s.style.transform = `translate(${Math.random()*300-150}px, ${Math.random()*300-150}px)`;

        document.body.appendChild(s);
        setTimeout(()=>s.remove(),2000);
    }
}

/* TEXT */
const content = ` DEAR LYNNTT,
  There are moments that pass… and then there are moments that stay.

You were never loud in my life,
but somehow, you became unforgettable.

I CAN'T regret the time I were with you here
I KNOW I DID MY BEST
MY HEART WAS PURE AND MY INTENTIONS WERE RIGHT.

And if distance ever rewrites what we were,
just know this never came from a place of emptiness…

It came from something rare.
Something honest.

Something that still chooses you, quietly.
YOURS DEVLISH, VINCENT IHURA.`;

/* REVEAL TEXT */
function reveal() {
    const lines = content.split("\n");

    lines.forEach((line, i) => {
        const div = document.createElement("div");
        div.className = "line";
        div.style.animationDelay = (i * 1.2) + "s";
        div.innerText = line;
        textDiv.appendChild(div);
    });
}

/* YES CLICK */
yesBtn.onclick = () => {

    sparkles();

    document.body.style.transition = "1.5s";
    document.body.style.background = "#f4e9dc";

    setTimeout(() => {
        screen1.style.opacity = "0";
        screen1.style.transform = "scale(1.1)";
    }, 500);

    setTimeout(() => {
        screen1.style.display = "none";
        screen2.style.opacity = "1";
        screen2.style.pointerEvents = "all";
        reveal();
    }, 1600);
};

</script>

</body>
</html>
